	function create() {
		backgroundAudio = game.add.audio('backgroundAudio');

		startAudio = game.add.audio('startAudio');

		successAudio=game.add.audio('successAudio');

		lostAudio=game.add.audio('lostAudio');
		gainAudio=game.add.audio('gainAudio');
		overAudio=game.add.audio('overAudio');
		
		game.input.onDown.addOnce(function () {
			if (game.sound.context && game.sound.context.state === 'suspended') {
				game.sound.context.resume();
			}

			if (!backgroundAudio.isPlaying) {
				backgroundAudio.loopFull(0.6);
			}
		}, this);

		game.physics.arcade.collide(ball,doctorRandom,ballHitDoctor);
		game.physics.arcade.collide(ball,cookerRandom,ballHitCooker);
		game.physics.arcade.collide(ball,singerRandom,ballHitSinger);
		game.physics.arcade.collide(ball,astronautRandom,ballHitAstronaut);
		game.physics.arcade.collide(ball,pilotRandom,ballHitPilot);
		game.physics.arcade.collide(ball,painterRandom,ballHitPainter);
		game.physics.arcade.collide(ball,photographerRandom,ballHitPhotographer);
		game.physics.arcade.collide(ball,policeRandom,ballHitPolice);
		game.physics.arcade.collide(ball,gardenerRandom,ballHitGardener);
		game.physics.arcade.collide(ball,teacherRandom,ballHitTeacher);
		game.physics.arcade.collide(ball,levels[level-1], ballLeaveScreen);

		keyboardUSe();
		//up();
	}

	function keyboardUSe(){
		if(playingDoctor||playingCooker||playingSinger||playingAstronaut||playingPilot||playingPainter||playingPolice||playingPhotographer||playingTeacher||playingGardener){
			if(game.input.keyboard.isDown(Phaser.Keyboard.LEFT)){
				ball.body.velocity.set(-150,0);
				//ball.angle=-90;
				//keyPressAudio.play();
				ball.body.gravity.y = 250;
			}
			else if(game.input.keyboard.isDown(Phaser.Keyboard.RIGHT)){
				ball.body.velocity.set(150,0);
				//rocket.angle=90;
				//keyPressAudio.play();
				ball.body.gravity.y = 250;
			}
			else if(game.input.keyboard.isDown(Phaser.Keyboard.UP)){
				ball.body.velocity.set(0,-150);
				//rocket.angle=0;
				//keyPressAudio.play();
				ball.body.gravity.y = 250;
			}
			
		}

	}

			if(doctorTab.length>1){
				score += 10;
				scoreText.setText(score);
				finishLevel();
				successAudio.play();
				successButton.visible=true;
				game.time.events.add(Phaser.Timer.SECOND *1, success, this); 
				doctorRandom.kill();
				cookerRandom.kill();
				singerRandom.kill();
				ball.reset(game.world.width*0.5, game.world.height-20);
				doctorTab.splice(indDoctor,1);
				indTabPosition=Phaser.Math.between(0,2);
				getDoctorSprite(tabPositionX[indTabPosition]);

					getCookerSprite(tabPositionX[1]);

					getCookerSprite(tabPositionX[0]);
					getSingerSprite(tabPositionX[2]);
				}
				else if(indTabPosition==2){
					getCookerSprite(tabPositionX[1]);
					getSingerSprite(tabPositionX[0]);
				}
				ball.reset(game.world.width*0.5, game.world.height-20);

			}
			else {

			}

		this.levels[lvl-1].visible = true;
